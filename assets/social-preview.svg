<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- ChronoSolve — GitHub Social Preview Banner (1280x640) -->

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .title { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; font-size: 72px; fill: white; }
      .tagline { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; font-size: 26px; fill: #CBD5E1; }
      .badge-text { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-weight: 500; font-size: 14px; letter-spacing: 0.05em; }
    </style>

    <!-- Radial gradient for vignette background -->
    <radialGradient id="bg-gradient" cx="50%" cy="45%" r="70%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </radialGradient>
    <!-- Blur filter for background glows -->
    <filter id="glow-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80" />
    </filter>
  </defs>

  <!-- Background with gradient vignette -->
  <rect width="1280" height="640" fill="url(#bg-gradient)" />

  <!-- Colored blur glows (matches Figma's mix-blend-screen bg blurs) -->
  <ellipse cx="950" cy="150" rx="320" ry="260" fill="#4338CA" opacity="0.12" filter="url(#glow-blur)" />
  <ellipse cx="1000" cy="450" rx="280" ry="220" fill="#0F766E" opacity="0.12" filter="url(#glow-blur)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="640" stroke="white" stroke-width="1" />
    <line x1="80" y1="0" x2="80" y2="640" stroke="white" stroke-width="1" />
    <line x1="160" y1="0" x2="160" y2="640" stroke="white" stroke-width="1" />
    <line x1="240" y1="0" x2="240" y2="640" stroke="white" stroke-width="1" />
    <line x1="320" y1="0" x2="320" y2="640" stroke="white" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="640" stroke="white" stroke-width="1" />
    <line x1="480" y1="0" x2="480" y2="640" stroke="white" stroke-width="1" />
    <line x1="560" y1="0" x2="560" y2="640" stroke="white" stroke-width="1" />
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="1" />
    <line x1="720" y1="0" x2="720" y2="640" stroke="white" stroke-width="1" />
    <line x1="800" y1="0" x2="800" y2="640" stroke="white" stroke-width="1" />
    <line x1="880" y1="0" x2="880" y2="640" stroke="white" stroke-width="1" />
    <line x1="960" y1="0" x2="960" y2="640" stroke="white" stroke-width="1" />
    <line x1="1040" y1="0" x2="1040" y2="640" stroke="white" stroke-width="1" />
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="white" stroke-width="1" />
    <line x1="1200" y1="0" x2="1200" y2="640" stroke="white" stroke-width="1" />
    <line x1="1280" y1="0" x2="1280" y2="640" stroke="white" stroke-width="1" />
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1" />
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1" />
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1" />
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1" />
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1" />
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="1" />
    <line x1="0" y1="560" x2="1280" y2="560" stroke="white" stroke-width="1" />
    <line x1="0" y1="640" x2="1280" y2="640" stroke="white" stroke-width="1" />
  </g>

  <!-- Product badges (ghost/outline style like Figma) -->
  <g transform="translate(100, 200)">
    <!-- Badge: Timetable Scheduling -->
    <rect x="0" y="0" width="210" height="36" rx="18" fill="#6366F1" opacity="0.2" />
    <rect x="0" y="0" width="210" height="36" rx="18" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.3" />
    <text x="105" y="23" text-anchor="middle" class="badge-text" fill="#A5B4FC">Timetable Scheduling</text>

    <!-- Badge: Constraint Solver -->
    <rect x="224" y="0" width="180" height="36" rx="18" fill="#14B8A6" opacity="0.2" />
    <rect x="224" y="0" width="180" height="36" rx="18" fill="none" stroke="#14B8A6" stroke-width="1" opacity="0.3" />
    <text x="314" y="23" text-anchor="middle" class="badge-text" fill="#5EEAD4">Constraint Solver</text>

    <!-- Badge: Desktop App -->
    <rect x="418" y="0" width="150" height="36" rx="18" fill="#F59E0B" opacity="0.2" />
    <rect x="418" y="0" width="150" height="36" rx="18" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.3" />
    <text x="493" y="23" text-anchor="middle" class="badge-text" fill="#FCD34D">Desktop App</text>
  </g>

  <!-- Title -->
  <text x="100" y="315" class="title">Chrono<tspan style="fill: #0F766E">Solve</tspan></text>

  <!-- Tagline -->
  <text x="100" y="370" class="tagline">Generalized university course timetable scheduler.</text>
  <text x="100" y="405" class="tagline">Optimal, conflict-free timetables. Every time.</text>

  <!-- Logo mark (right side, large) -->
  <g transform="translate(880, 140) scale(3.6)">
    <!-- Row 1 — Indigo -->
    <rect x="12" y="16" width="40" height="18" rx="4" fill="#4338CA" />
    <!-- Row 2 — Teal -->
    <rect x="28" y="41" width="44" height="18" rx="4" fill="#0F766E" />
    <!-- Row 3 — Amber -->
    <rect x="48" y="66" width="40" height="18" rx="4" fill="#D97706" />
    <!-- Optimization Path -->
    <path
      d="M 20 25 H 34 A 8 8 0 0 1 42 33 V 42 A 8 8 0 0 0 50 50 H 52 A 8 8 0 0 1 60 58 V 67 A 8 8 0 0 0 68 75 H 80"
      stroke="white"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>
</svg>
