<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- ChronoSolve Logo — Monochrome / Stencil Variant -->
  <!-- White blocks with path carved out as negative space -->

  <defs>
    <mask id="path-mask">
      <rect width="100" height="100" fill="white" />
      <path
        d="M 20 25 H 34 A 8 8 0 0 1 42 33 V 42 A 8 8 0 0 0 50 50 H 52 A 8 8 0 0 1 60 58 V 67 A 8 8 0 0 0 68 75 H 80"
        stroke="black"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
    </mask>
  </defs>

  <g mask="url(#path-mask)">
    <!-- Row 1 -->
    <rect x="12" y="16" width="40" height="18" rx="4" fill="white" />
    <!-- Row 2 -->
    <rect x="28" y="41" width="44" height="18" rx="4" fill="white" />
    <!-- Row 3 -->
    <rect x="48" y="66" width="40" height="18" rx="4" fill="white" />
  </g>
</svg>
