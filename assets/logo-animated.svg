<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- ChronoSolve Logo — Animated (SMIL) -->
  <!-- Blocks slide in from alternating sides, then the solver path draws itself -->

  <!-- Row 1 — Indigo (slides in from left) -->
  <rect x="12" y="16" width="40" height="18" rx="4" fill="#4338CA" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.6s" fill="freeze" />
    <animate attributeName="x" from="-30" to="12" begin="0.4s" dur="0.6s" fill="freeze"
      calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1" />
  </rect>

  <!-- Row 2 — Teal (slides in from right) -->
  <rect x="28" y="41" width="44" height="18" rx="4" fill="#0F766E" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.6s" fill="freeze" />
    <animate attributeName="x" from="110" to="28" begin="1.1s" dur="0.6s" fill="freeze"
      calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1" />
  </rect>

  <!-- Row 3 — Amber (slides in from left) -->
  <rect x="48" y="66" width="40" height="18" rx="4" fill="#D97706" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.6s" fill="freeze" />
    <animate attributeName="x" from="-30" to="48" begin="1.8s" dur="0.6s" fill="freeze"
      calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1" />
  </rect>

  <!-- Optimization Path (draws itself after blocks settle) -->
  <path
    d="M 20 25 H 34 A 8 8 0 0 1 42 33 V 42 A 8 8 0 0 0 50 50 H 52 A 8 8 0 0 1 60 58 V 67 A 8 8 0 0 0 68 75 H 80"
    stroke="white"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    stroke-dasharray="150"
    stroke-dashoffset="150"
  >
    <animate attributeName="stroke-dashoffset" from="150" to="0"
      begin="2.6s" dur="2s" fill="freeze"
      calcMode="spline" keySplines="0.22 1 0.36 1" keyTimes="0;1" />
  </path>
</svg>
