name: release

# Release-please drives versioning. A feature/fix merge to main does NOT cut a
# release - it opens (or updates) a single "Release vX.Y.Z" PR. The release is cut
# ONLY when a maintainer merges that Release PR.
#
#   - Conventional commits decide the bump: feat -> minor, fix/perf -> patch,
#     ! or BREAKING CHANGE -> major. build(deps)/chore/docs/ci -> no version change.
#   - Merging the Release PR bumps app/package.json + app/src-tauri/tauri.conf.json
#     and updates CHANGELOG.md (release-please commits these via its own PR), then
#     tags vX.Y.Z and creates the GitHub release.
#   - The release is a DRAFT (the .dmg is unsigned / not notarized yet) for a
#     maintainer to review and publish. The default GITHUB_TOKEN is enough:
#     release-please opens a PR, it never pushes to protected main directly, so no
#     PAT is required.
#   - workflow_dispatch builds the .dmg as an artifact WITHOUT cutting a release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read # least privilege by default; each job elevates only what it needs

concurrency:
  group: release # serialize so two quick merges can't race the Release PR / a tag
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write # bump versions + tag + create the release
      pull-requests: write # open / update the Release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: build dmg (aarch64)
    needs: release-please
    # Build when a release was just cut (to attach the .dmg) or on a manual run (to
    # produce an artifact). No status function here, so this still requires the
    # release-please job to have succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-14 # Apple Silicon -> aarch64 .dmg
    timeout-minutes: 45
    permissions:
      contents: write # upload the .dmg asset to the draft release
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Build solver sidecar (PyInstaller onedir)
        run: ./scripts/build_sidecar.sh

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: app

      # The version in tauri.conf.json/package.json was already bumped by the merged
      # Release PR, so the built .dmg carries the right version - no stamping needed.
      - name: Attach .dmg to draft release
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        env:
          # Surfaced through env (not inline ${{ }}) so the value is never re-parsed
          # as shell. tag_name is a release-please-derived vX.Y.Z string.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" app/src-tauri/target/release/bundle/dmg/*.dmg --clobber

      - name: Upload .dmg artifact (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: ChronoSolve-macos-aarch64
          path: app/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
