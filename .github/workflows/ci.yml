name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-quality:
    name: python-quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Run Python test suite
        run: uv run pytest tests/

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run frontend test suite
        run: npm run test

      - name: Build
        run: npm run build

  rust-quality:
    name: rust-quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: app/src-tauri

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Set up Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Check formatting
        run: cargo fmt --check

      # tauri-build errors at compile time if the binaries/solver resource glob
      # (bundle.resources in tauri.conf.json) matches nothing. The staged sidecar
      # is gitignored, so it is absent in a fresh CI checkout; a real build runs
      # scripts/build_sidecar.sh, but for the lint job a stub satisfies the glob.
      # Mirrors ensure_sidecar_stub in scripts/workflow.sh.
      - name: Stage solver sidecar stub
        run: mkdir -p binaries/solver && echo "ci stub; real onedir staged by scripts/build_sidecar.sh" > binaries/solver/stub.txt

      - name: Clippy
        run: cargo clippy -- -D warnings
