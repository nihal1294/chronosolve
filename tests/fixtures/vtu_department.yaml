# VTU CS Department - 4th semester, 3 sections, ~15 subjects, Saturday half-day
time_structure:
  days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]
  slots_per_day: 8
  slot_overrides:
    Saturday: 4
  slot_labels:
    1: "9:00 - 9:55"
    2: "10:00 - 10:55"
    3: "11:00 - 11:55"
    4: "12:00 - 12:55"
    5: "13:30 - 14:25"
    6: "14:30 - 15:25"
    7: "15:30 - 16:25"
    8: "16:30 - 17:25"

teachers:
  - id: prof_anand
    name: Prof. Anand Kumar
    preferences:
      max_hours_per_day: 6
      schedule_style: compact
  - id: prof_meera
    name: Prof. Meera Nair
    unavailable:
      Saturday: [1, 2, 3, 4]
    preferences:
      min_free_days: 1
  - id: prof_ravi
    name: Prof. Ravi Shankar
    preferences:
      slot_preferences:
        Monday: { 1: preferred, 2: preferred }
        Tuesday: { 1: preferred, 2: preferred }
      consecutive_hours: prefer
      max_consecutive: 3
  - id: prof_deepa
    name: Prof. Deepa Hegde
  - id: prof_suresh
    name: Prof. Suresh Patil
    preferences:
      leave_early:
        Friday: 6
  - id: prof_kavitha
    name: Prof. Kavitha Rao
    unavailable:
      Wednesday: [7, 8]
  - id: prof_mohan
    name: Prof. Mohan Das
    preferences:
      max_hours_per_day: 5
  - id: prof_sneha
    name: Prof. Sneha Kulkarni

