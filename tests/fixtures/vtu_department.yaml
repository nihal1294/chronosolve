constraints:
  hard:
    teacher_no_clash: true
    group_no_clash: true
    room_no_clash: true
    respect_availability: true
    required_hours: true
  soft:
    minimize_student_gaps: 80
    minimize_teacher_gaps: 60
    spread_subjects: 50
    teacher_time_preferences: 70
    compact_schedules: 40
    avoid_consecutive_hours: 30
    workload_balance: 50
