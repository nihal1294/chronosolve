<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    ChronoSolve macOS app-icon master. Apple icon grid: 824x824 rounded-rect
    content centered on a 1024x1024 canvas (100px transparent margin each side,
    ~9.8%) with the system corner radius (~22.37% of the side). macOS does NOT
    mask Dock icons, so the squircle + padding must be baked into the artwork.
    Mark = the BrandLogo "app-icon" variant (0..100 coords) mapped into the
    squircle via translate(100,100) scale(8.24).
  -->
  <rect x="100" y="100" width="824" height="824" rx="185.4" ry="185.4" fill="#0F172A"/>
  <g transform="translate(100,100) scale(8.24)">
    <rect x="12" y="16" width="40" height="18" rx="4" fill="#4338CA"/>
    <rect x="28" y="41" width="44" height="18" rx="4" fill="#0F766E"/>
    <rect x="48" y="66" width="40" height="18" rx="4" fill="#D97706"/>
    <path d="M 20 25 H 34 A 8 8 0 0 1 42 33 V 42 A 8 8 0 0 0 50 50 H 52 A 8 8 0 0 1 60 58 V 67 A 8 8 0 0 0 68 75 H 80"
          stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
